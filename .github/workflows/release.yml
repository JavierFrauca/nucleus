name: Release

# Build the embeddable native-library bundles (Windows DLL + Linux/macOS shared
# libs) and publish them as a GitHub Release when a version tag is pushed (e.g.
# `v0.1.3`). `workflow_dispatch` builds the same bundles as downloadable artifacts
# WITHOUT publishing a release, so the packaging can be smoke-tested before tagging.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  windows-bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi
      # dist/nucleus-dll-<version>-windows-x64.zip (nucleus.dll statically links ONNX).
      - name: Build DLL bundle
        shell: pwsh
        run: pwsh packaging/build-dll.ps1 -Version ${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: dist/*.zip
          if-no-files-found: error

  unix-bundle:
    name: unix-bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # linux x64 and macOS arm64 (Apple Silicon). macOS Intel (macos-13) is
        # intentionally out of scope — GitHub no longer schedules runners for
        # that label, which previously hung `unix-bundle` for 24h and blocked
        # `publish` (it needs every matrix member of this job to succeed).
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi
      # dist/nucleus-lib-<version>-<os>-<arch>.tar.gz
      - name: Build shared-library bundle
        run: bash packaging/build-lib.sh "${{ steps.ver.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: dist/*.tar.gz
          if-no-files-found: error

  # Pack and push NucleusDatabase.Client (the HTTP client) to NuGet.org. Independent of
  # the native bundle jobs above (no `needs`) so a NuGet hiccup never blocks the
  # GitHub Release, and vice versa.
  #
  # Uses Trusted Publishing (OIDC) — same pattern as ragkit's release.yml — instead
  # of a long-lived NUGET_API_KEY: GitHub's OIDC token is exchanged for a NuGet API
  # key valid for 1h, so no API key secret is stored in the repo at all. One-time
  # setup on nuget.org (Account settings > Trusted Publishing) with Owner=<your
  # GitHub org/user>, Repository=nucleus, Workflow file=release.yml, Environment
  # blank; plus a NUGET_USER repo secret with your nuget.org username (not a key).
  nuget-publish:
    name: nuget-publish (NucleusDatabase.Client)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required to request the OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Pack
        run: |
          dotnet pack clients/csharp/Nucleus.Client/Nucleus.Client.csproj \
            -c Release -p:PackageVersion=${{ steps.ver.outputs.version }} \
            -o dist-nuget
      - name: NuGet login (OIDC → temporary API key, valid 1h)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Push to NuGet.org
        run: >
          dotnet nuget push "dist-nuget/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  # Only on a version tag: gather every platform bundle and publish the release.
  publish:
    needs: [windows-bundle, unix-bundle]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      # `gh release create --generate-notes` shells out to `git` to build the
      # auto-generated notes (diff against the previous tag) — without a checkout
      # there is no repo here and it fails with "fatal: not a git repository".
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
