name: Release

# Build the embeddable native-library bundles (Windows DLL + Linux/macOS shared
# libs) and publish them as a GitHub Release when a version tag is pushed (e.g.
# `v0.1.3`). `workflow_dispatch` builds the same bundles as downloadable artifacts
# WITHOUT publishing a release, so the packaging can be smoke-tested before tagging.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  windows-bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi
      # dist/nucleus-dll-<version>-windows-x64.zip (nucleus.dll statically links ONNX).
      - name: Build DLL bundle
        shell: pwsh
        run: pwsh packaging/build-dll.ps1 -Version ${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: dist/*.zip
          if-no-files-found: error

  unix-bundle:
    name: unix-bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # linux x64, macOS arm64 (Apple Silicon) and macOS x64 (Intel).
        os: [ubuntu-latest, macos-latest, macos-13]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi
      # dist/nucleus-lib-<version>-<os>-<arch>.tar.gz
      - name: Build shared-library bundle
        run: bash packaging/build-lib.sh "${{ steps.ver.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: dist/*.tar.gz
          if-no-files-found: error

  # Only on a version tag: gather every platform bundle and publish the release.
  publish:
    needs: [windows-bundle, unix-bundle]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
