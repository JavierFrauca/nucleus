<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nucleus — demo navegador</title>
  <style>
    body { font: 15px system-ui, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 16px; color: #1e293b; }
    h1 { font-size: 20px; } h2 { font-size: 16px; margin-top: 0; }
    fieldset { border: 1px solid #cbd5e1; border-radius: 8px; margin: 16px 0; padding: 14px; }
    input, textarea, button { font: inherit; padding: 7px 9px; border: 1px solid #cbd5e1; border-radius: 6px; }
    input, textarea { width: 100%; box-sizing: border-box; margin: 4px 0 10px; }
    button { background: #3b82f6; color: #fff; border: 0; cursor: pointer; }
    button.tab { background: #e2e8f0; color: #1e293b; margin-right: 6px; }
    button.tab.active { background: #3b82f6; color: #fff; }
    .panel { display: none; } .panel.active { display: block; }
    .hit { border-bottom: 1px solid #e2e8f0; padding: 8px 0; }
    .score { color: #14b8a6; font-weight: 600; }
    #log { color: #64748b; font-size: 13px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Nucleus — demo navegador</h1>

  <!-- 1) Conexión: URL + token -->
  <fieldset>
    <h2>Conexión</h2>
    <label>URL del servidor <input id="url" value="http://127.0.0.1:8080" /></label>
    <label>Token <input id="token" type="password" placeholder="nuc_…" /></label>
    <button id="connect">Conectar</button>
    <div id="log"></div>
  </fieldset>

  <!-- pestañas = "pantallas" -->
  <button class="tab active" data-tab="ingesta">Pantalla: Ingesta</button>
  <button class="tab" data-tab="busqueda">Pantalla: Búsqueda</button>

  <!-- 2) Pantalla de ingesta -->
  <fieldset id="ingesta" class="panel active">
    <h2>Ingestar texto</h2>
    <label>Dominio (nombre) <input id="ing-domain" value="demo-web" /></label>
    <label>Texto <textarea id="ing-text" rows="4">Los tipos de retención de IRPF para 2026 se publican en el cuadro oficial.</textarea></label>
    <button id="ing-go">Ingestar texto</button>
    <hr style="margin:14px 0;border:0;border-top:1px solid #e2e8f0" />
    <label>…o un fichero crudo (PDF/DOCX/…) <input id="ing-file" type="file" /></label>
    <button id="ing-upload">Subir fichero</button>
  </fieldset>

  <!-- 3) Pantalla de búsqueda -->
  <fieldset id="busqueda" class="panel">
    <h2>Buscar</h2>
    <label>Dominio (nombre) <input id="q-domain" value="demo-web" /></label>
    <label>Consulta <input id="q-text" value="retención IRPF 2026" /></label>
    <button id="q-go">Buscar</button>
    <div id="results"></div>
  </fieldset>

  <script type="module">
    // Referencia al SDK (build ESM). Con npm sería: import { NucleusClient } from "nucleus-client";
    import { NucleusClient } from "../../../clients/typescript/dist/index.js";

    const $ = (id) => document.getElementById(id);
    const log = (m) => { $("log").textContent = m; };
    let nucleus = null;
    const domains = {}; // nombre -> id (cache para no recrear)

    // Inicialización del cliente.
    $("connect").onclick = async () => {
      nucleus = new NucleusClient({ baseUrl: $("url").value.trim(), token: $("token").value.trim() });
      try { log(`Conectado. ¿Listo? ${await nucleus.isReady()}`); }
      catch (e) { log("Error: " + e.message); }
    };

    // Cambiar de "pantalla".
    document.querySelectorAll(".tab").forEach((b) => b.onclick = () => {
      document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((x) => x.classList.remove("active"));
      b.classList.add("active");
      $(b.dataset.tab).classList.add("active");
    });

    // get-or-create del dominio por nombre.
    async function domainId(name) {
      if (domains[name]) return domains[name];
      const existing = (await nucleus.listDomains()).find((d) => d.name === name);
      const d = existing ?? (await nucleus.createDomain(name));
      domains[name] = d.id;
      return d.id;
    }

    // Pantalla Ingesta → llama a ingestDocument + espera el job.
    $("ing-go").onclick = async () => {
      if (!nucleus) return log("Conecta primero.");
      try {
        const id = await domainId($("ing-domain").value.trim());
        const { job_id } = await nucleus.ingestDocument(id, { title: "web", text: $("ing-text").value, labels: ["web"] });
        log("Ingestando (job " + job_id + ")…");
        let job = await nucleus.getJob(job_id);
        while (job.status !== "Done" && job.status !== "Failed") {
          await new Promise((r) => setTimeout(r, 400));
          job = await nucleus.getJob(job_id);
        }
        log("Ingesta: " + job.status);
      } catch (e) { log("Error: " + e.message); }
    };

    // Pantalla Ingesta → subir un fichero CRUDO: se mandan los bytes, Nucleus extrae el texto.
    $("ing-upload").onclick = async () => {
      if (!nucleus) return log("Conecta primero.");
      const f = $("ing-file").files[0];
      if (!f) return log("Elige un fichero.");
      try {
        const id = await domainId($("ing-domain").value.trim());
        const bytes = new Uint8Array(await f.arrayBuffer());
        const up = await nucleus.uploadFile(id, f.name, bytes, { subdomain: "docs", labels: ["web"] });
        log(`Subido (job ${up.job_id}, ${up.chars} chars)…`);
        let job = await nucleus.getJob(up.job_id);
        while (job.status !== "Done" && job.status !== "Failed") {
          await new Promise((r) => setTimeout(r, 500));
          job = await nucleus.getJob(up.job_id);
        }
        log(`Fichero ${f.name}: ${job.status}`);
      } catch (e) { log("Error: " + e.message); }
    };

    // Pantalla Búsqueda → llama a search y pinta los hits.
    $("q-go").onclick = async () => {
      if (!nucleus) return log("Conecta primero.");
      try {
        const id = await domainId($("q-domain").value.trim());
        const hits = await nucleus.search(id, { query: $("q-text").value, k: 5 });
        $("results").innerHTML = hits.length
          ? hits.map((h) => `<div class="hit"><span class="score">${h.score.toFixed(3)}</span> ${h.text.slice(0, 160)}</div>`).join("")
          : "<p>(sin resultados)</p>";
        log(hits.length + " resultado(s)");
      } catch (e) { log("Error: " + e.message); }
    };
  </script>
</body>
</html>
